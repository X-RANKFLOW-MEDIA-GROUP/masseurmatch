<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05101e"/><stop offset="100%" stop-color="#091828"/>
    </linearGradient>
    <filter id="gblur"><feGaussianBlur stdDeviation="22"/></filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <circle cx="400" cy="280" r="220" fill="#FF8A1F" opacity="0.06" filter="url(#gblur)"/>
  <g stroke="#fff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="160" x2="800" y2="160"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="480" x2="800" y2="480"/><line x1="0" y1="640" x2="800" y2="640"/>
    <line x1="160" y1="0" x2="160" y2="800"/><line x1="320" y1="0" x2="320" y2="800"/>
    <line x1="480" y1="0" x2="480" y2="800"/><line x1="640" y1="0" x2="640" y2="800"/>
  </g>
  <!-- Washington Monument -->
  <polygon points="388,560 412,560 406,220 394,220" fill="#FF8A1F" opacity="0.28"/>
  <polygon points="394,220 406,220 400,200" fill="#FF8A1F" opacity="0.45"/>
  <!-- Reflecting pool -->
  <rect x="350" y="560" width="100" height="20" fill="#0e2a4a" rx="2"/>
  <line x1="350" y1="570" x2="450" y2="570" stroke="#FF8A1F" stroke-width="1" opacity="0.3"/>
  <!-- Capitol dome (simplified) -->
  <rect x="300" y="490" width="90" height="70" fill="#122036" opacity="0.6"/>
  <path d="M300 490 Q345 450 390 490" fill="#122036" opacity="0.6"/>
  <rect x="335" y="435" width="20" height="55" fill="#122036" opacity="0.55"/>
  <!-- Skyline -->
  <g fill="#101d30" opacity="0.55">
    <rect x="60" y="490" width="50" height="110"/><rect x="120" y="470" width="45" height="130"/>
    <rect x="175" y="455" width="55" height="145"/>
    <rect x="510" y="460" width="55" height="140"/><rect x="575" y="445" width="60" height="155"/>
    <rect x="645" y="460" width="55" height="140"/>
  </g>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#FF8A1F" stroke-width="1" opacity="0.15"/>
  <text x="400" y="678" font-family="Georgia,serif" font-size="46" font-weight="700" fill="#FCFBF8" text-anchor="middle" letter-spacing="-1">WASHINGTON</text>
  <text x="400" y="716" font-family="Georgia,serif" font-size="20" fill="#FF8A1F" text-anchor="middle" letter-spacing="5">D.C.</text>
  <rect x="355" y="740" width="90" height="2" fill="#FF8A1F" opacity="0.5" rx="1"/>
</svg>
