<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#050e1a"/><stop offset="100%" stop-color="#0c1e35"/>
    </linearGradient>
    <filter id="gblur"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <circle cx="420" cy="280" r="220" fill="#FF8A1F" opacity="0.06" filter="url(#gblur)"/>
  <g stroke="#fff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="160" x2="800" y2="160"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="480" x2="800" y2="480"/><line x1="0" y1="640" x2="800" y2="640"/>
    <line x1="160" y1="0" x2="160" y2="800"/><line x1="320" y1="0" x2="320" y2="800"/>
    <line x1="480" y1="0" x2="480" y2="800"/><line x1="640" y1="0" x2="640" y2="800"/>
  </g>
  <!-- Empire State Building -->
  <rect x="378" y="520" width="44" height="80" fill="#FF8A1F" opacity="0.18"/>
  <rect x="384" y="440" width="32" height="80" fill="#FF8A1F" opacity="0.22"/>
  <rect x="390" y="380" width="20" height="60" fill="#FF8A1F" opacity="0.28"/>
  <rect x="395" y="310" width="10" height="70" fill="#FF8A1F" opacity="0.5"/>
  <rect x="398" y="270" width="4" height="40" fill="#FF8A1F" opacity="0.7"/>
  <!-- NYC Skyline -->
  <g fill="#132240" opacity="0.65">
    <rect x="60" y="500" width="50" height="100"/><rect x="120" y="460" width="45" height="140"/>
    <rect x="175" y="420" width="55" height="180"/><rect x="240" y="390" width="60" height="210"/>
    <rect x="310" y="440" width="50" height="160"/><rect x="460" y="420" width="55" height="180"/>
    <rect x="525" y="400" width="65" height="200"/><rect x="600" y="440" width="50" height="160"/>
    <rect x="660" y="460" width="60" height="140"/><rect x="730" y="490" width="50" height="110"/>
  </g>
  <!-- One WTC -->
  <polygon points="550,320 560,600 540,600" fill="#1a3563" opacity="0.5"/>
  <rect x="543" y="315" width="14" height="10" fill="#FF8A1F" opacity="0.4"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#FF8A1F" stroke-width="1" opacity="0.15"/>
  <text x="400" y="688" font-family="Georgia,serif" font-size="56" font-weight="700" fill="#FCFBF8" text-anchor="middle" letter-spacing="-1">NEW YORK</text>
  <text x="400" y="724" font-family="Georgia,serif" font-size="16" fill="#FF8A1F" text-anchor="middle" letter-spacing="6">NEW YORK</text>
  <rect x="340" y="742" width="120" height="2" fill="#FF8A1F" opacity="0.5" rx="1"/>
</svg>
