<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060d1a"/><stop offset="100%" stop-color="#0a1a2e"/>
    </linearGradient>
    <filter id="gblur"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <ellipse cx="400" cy="300" rx="230" ry="180" fill="#FF8A1F" opacity="0.07" filter="url(#gblur)"/>
  <g stroke="#fff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="160" x2="800" y2="160"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="480" x2="800" y2="480"/><line x1="0" y1="640" x2="800" y2="640"/>
    <line x1="160" y1="0" x2="160" y2="800"/><line x1="320" y1="0" x2="320" y2="800"/>
    <line x1="480" y1="0" x2="480" y2="800"/><line x1="640" y1="0" x2="640" y2="800"/>
  </g>
  <!-- Willis Tower (3-step silhouette) -->
  <rect x="355" y="540" width="90" height="60" fill="#FF8A1F" opacity="0.15"/>
  <rect x="363" y="440" width="74" height="100" fill="#FF8A1F" opacity="0.18"/>
  <rect x="372" y="340" width="56" height="100" fill="#FF8A1F" opacity="0.22"/>
  <rect x="380" y="260" width="40" height="80" fill="#FF8A1F" opacity="0.3"/>
  <!-- Antennae -->
  <line x1="388" y1="260" x2="388" y2="200" stroke="#FF8A1F" stroke-width="3" opacity="0.55"/>
  <line x1="412" y1="260" x2="412" y2="210" stroke="#FF8A1F" stroke-width="3" opacity="0.55"/>
  <!-- City skyline -->
  <g fill="#112035" opacity="0.65">
    <rect x="60" y="470" width="55" height="130"/><rect x="125" y="440" width="50" height="160"/>
    <rect x="185" y="410" width="60" height="190"/><rect x="255" y="430" width="50" height="170"/>
    <rect x="465" y="420" width="55" height="180"/><rect x="530" y="400" width="65" height="200"/>
    <rect x="605" y="430" width="55" height="170"/><rect x="670" y="460" width="60" height="140"/>
  </g>
  <!-- Lake horizon -->
  <path d="M0 600 Q200 590 400 600 Q600 610 800 600 L800 800 L0 800 Z" fill="#081525" opacity="0.8"/>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#FF8A1F" stroke-width="1" opacity="0.18"/>
  <text x="400" y="688" font-family="Georgia,serif" font-size="64" font-weight="700" fill="#FCFBF8" text-anchor="middle" letter-spacing="-1">CHICAGO</text>
  <text x="400" y="724" font-family="Georgia,serif" font-size="16" fill="#FF8A1F" text-anchor="middle" letter-spacing="6">ILLINOIS</text>
  <rect x="345" y="742" width="110" height="2" fill="#FF8A1F" opacity="0.5" rx="1"/>
</svg>
