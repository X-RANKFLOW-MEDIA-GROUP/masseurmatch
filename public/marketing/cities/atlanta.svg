<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060d1b"/><stop offset="100%" stop-color="#0a1a2e"/>
    </linearGradient>
    <filter id="gblur"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <ellipse cx="420" cy="280" rx="250" ry="190" fill="#FF8A1F" opacity="0.07" filter="url(#gblur)"/>
  <g stroke="#fff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="160" x2="800" y2="160"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="480" x2="800" y2="480"/><line x1="0" y1="640" x2="800" y2="640"/>
    <line x1="160" y1="0" x2="160" y2="800"/><line x1="320" y1="0" x2="320" y2="800"/>
    <line x1="480" y1="0" x2="480" y2="800"/><line x1="640" y1="0" x2="640" y2="800"/>
  </g>
  <!-- Bank of America Plaza (pointed top) -->
  <rect x="370" y="480" width="60" height="120" fill="#FF8A1F" opacity="0.16"/>
  <polygon points="370,480 430,480 400,330" fill="#FF8A1F" opacity="0.2"/>
  <line x1="400" y1="330" x2="400" y2="275" stroke="#FF8A1F" stroke-width="3" opacity="0.5"/>
  <!-- Peach shape -->
  <path d="M400 195 Q430 210 430 240 Q430 268 400 275 Q370 268 370 240 Q370 210 400 195 Z" fill="none" stroke="#FF8A1F" stroke-width="1.5" opacity="0.35"/>
  <line x1="400" y1="195" x2="400" y2="180" stroke="#FF8A1F" stroke-width="2" opacity="0.3"/>
  <!-- Atlanta skyline -->
  <g fill="#111e35" opacity="0.65">
    <rect x="80" y="470" width="55" height="130"/><rect x="145" y="440" width="50" height="160"/>
    <rect x="205" y="410" width="60" height="190"/><rect x="275" y="430" width="50" height="170"/>
    <rect x="460" y="420" width="60" height="180"/><rect x="530" y="400" width="65" height="200"/>
    <rect x="605" y="430" width="55" height="170"/><rect x="670" y="455" width="60" height="145"/>
  </g>
  <line x1="0" y1="600" x2="800" y2="600" stroke="#FF8A1F" stroke-width="1" opacity="0.15"/>
  <text x="400" y="688" font-family="Georgia,serif" font-size="64" font-weight="700" fill="#FCFBF8" text-anchor="middle" letter-spacing="-1">ATLANTA</text>
  <text x="400" y="724" font-family="Georgia,serif" font-size="16" fill="#FF8A1F" text-anchor="middle" letter-spacing="6">GEORGIA</text>
  <rect x="345" y="742" width="110" height="2" fill="#FF8A1F" opacity="0.5" rx="1"/>
</svg>
