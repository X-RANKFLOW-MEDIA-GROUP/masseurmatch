<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1F3A"/>
      <stop offset="100%" stop-color="#060f1e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF8A1F" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF8A1F" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <!-- Ambient glow -->
  <circle cx="400" cy="300" r="280" fill="#FF8A1F" opacity="0.06" filter="url(#blur)"/>
  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="160" x2="800" y2="160"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="480" x2="800" y2="480"/><line x1="0" y1="640" x2="800" y2="640"/>
    <line x1="160" y1="0" x2="160" y2="800"/><line x1="320" y1="0" x2="320" y2="800"/>
    <line x1="480" y1="0" x2="480" y2="800"/><line x1="640" y1="0" x2="640" y2="800"/>
  </g>
  <!-- Reunion Tower -->
  <rect x="388" y="320" width="24" height="220" fill="#FF8A1F" opacity="0.25" rx="2"/>
  <circle cx="400" cy="305" r="38" fill="none" stroke="#FF8A1F" stroke-width="3" opacity="0.5"/>
  <circle cx="400" cy="305" r="24" fill="#FF8A1F" opacity="0.2"/>
  <!-- Skyline silhouette -->
  <g fill="#1a3a6e" opacity="0.5">
    <rect x="80" y="480" width="60" height="120"/>
    <rect x="150" y="440" width="50" height="160"/>
    <rect x="210" y="400" width="70" height="200"/>
    <rect x="290" y="360" width="80" height="240"/>
    <rect x="440" y="380" width="75" height="220"/>
    <rect x="525" y="420" width="65" height="180"/>
    <rect x="600" y="450" width="55" height="150"/>
    <rect x="665" y="470" width="55" height="130"/>
  </g>
  <!-- Horizon line -->
  <line x1="0" y1="600" x2="800" y2="600" stroke="#FF8A1F" stroke-width="1" opacity="0.2"/>
  <!-- Star of Texas accent -->
  <text x="400" y="210" font-family="Georgia, serif" font-size="44" fill="#FF8A1F" opacity="0.35" text-anchor="middle">★</text>
  <!-- City name -->
  <text x="400" y="690" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="#FCFBF8" text-anchor="middle" letter-spacing="-1">DALLAS</text>
  <text x="400" y="725" font-family="Georgia, serif" font-size="16" fill="#FF8A1F" text-anchor="middle" letter-spacing="6">TEXAS</text>
  <!-- Orange accent line -->
  <rect x="340" y="742" width="120" height="2" fill="#FF8A1F" opacity="0.5" rx="1"/>
</svg>
