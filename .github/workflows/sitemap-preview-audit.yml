name: Sitemap Preview Audit

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/sitemap-preview-audit.yml"
      - "scripts/validate-sitemap.mjs"
      - "src/app/robots.ts"
      - "src/app/sitemap.ts"
      - "src/app/sitemap/**"
      - "src/app/_lib/seo-data.ts"
      - "src/app/_lib/seo-routes.ts"
      - "src/app/_lib/sitemap-release.ts"

concurrency:
  group: sitemap-preview-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: read

jobs:
  sitemap-preview-audit:
    name: Sitemap Preview Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve Vercel preview URL
        id: preview
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.pull_request.head.sha;
            const deadlineMs = Date.now() + 10 * 60 * 1000;
            const isPreview = (url) => Boolean(url && /\.vercel\.app(?:\/|$)/.test(url));

            while (Date.now() < deadlineMs) {
              const deployments = await github.rest.repos.listDeployments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha,
                per_page: 100,
              });

              for (const deployment of deployments.data) {
                const statuses = await github.rest.repos.listDeploymentStatuses({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  deployment_id: deployment.id,
                  per_page: 100,
                });

                const ready = statuses.data.find((status) => {
                  const url = status.target_url || status.environment_url;
                  return status.state === "success" && isPreview(url);
                });

                if (ready) {
                  const url = ready.target_url || ready.environment_url;
                  core.info(`Resolved Vercel preview: ${url}`);
                  core.setOutput("url", url.replace(/\/$/, ""));
                  return;
                }
              }

              await new Promise((resolve) => setTimeout(resolve, 15000));
            }

            core.setFailed(`No successful Vercel preview was found for ${sha}.`);

      - name: Validate deployed sitemap, robots, canonicals, and indexability
        env:
          SITEMAP_STRICT: "1"
          SITEMAP_VALIDATION_BASE_URL: ${{ steps.preview.outputs.url }}
          SITEMAP_CANONICAL_ORIGIN: https://masseurmatch.com
          SITEMAP_VALIDATION_CONCURRENCY: "6"
        run: pnpm validate:sitemap
