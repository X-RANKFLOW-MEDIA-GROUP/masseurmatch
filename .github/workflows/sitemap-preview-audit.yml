name: Sitemap Preview Audit

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/sitemap-preview-audit.yml"
      - "scripts/validate-sitemap.mjs"
      - "src/app/robots.ts"
      - "src/app/sitemap.ts"
      - "src/app/sitemap/**"
      - "src/app/_lib/seo-data.ts"
      - "src/app/_lib/seo-routes.ts"
      - "src/app/_lib/sitemap-release.ts"

concurrency:
  group: sitemap-preview-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: read

jobs:
  sitemap-preview-audit:
    name: Sitemap Preview Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Resolve Vercel preview URL
        id: preview
        uses: actions/github-script@v7
        with:
          script: |
            const headSha = context.payload.pull_request.head.sha;
            let deploySha = headSha;

            // Vercel can skip deployments for workflow-only commits. Walk back
            // through those commits so the audit still targets the exact latest
            // deployable application commit rather than production.
            for (let depth = 0; depth < 10; depth += 1) {
              const commit = await github.rest.repos.getCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: deploySha,
              });
              const files = commit.data.files || [];
              const workflowOnly = files.length > 0 && files.every(
                (file) => file.filename.startsWith(".github/"),
              );
              if (!workflowOnly) break;

              const parentSha = commit.data.parents[0]?.sha;
              if (!parentSha) break;
              core.info(`Vercel may skip workflow-only commit ${deploySha}; checking parent ${parentSha}.`);
              deploySha = parentSha;
            }

            const deadlineMs = Date.now() + 5 * 60 * 1000;
            const isPreview = (url) => Boolean(url && /\.vercel\.app(?:\/|$)/.test(url));

            while (Date.now() < deadlineMs) {
              const deployments = await github.rest.repos.listDeployments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: deploySha,
                per_page: 100,
              });

              for (const deployment of deployments.data) {
                const statuses = await github.rest.repos.listDeploymentStatuses({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  deployment_id: deployment.id,
                  per_page: 100,
                });

                const ready = statuses.data.find((status) => {
                  const url = status.environment_url || status.target_url;
                  return status.state === "success" && isPreview(url);
                });

                if (ready) {
                  const url = ready.environment_url || ready.target_url;
                  core.info(`Resolved Vercel preview for ${deploySha}: ${url}`);
                  core.setOutput("url", url.replace(/\/$/, ""));
                  return;
                }
              }

              await new Promise((resolve) => setTimeout(resolve, 15000));
            }

            core.setFailed(`No successful Vercel preview was found for deployable commit ${deploySha}.`);

      - name: Validate deployed sitemap, robots, canonicals, and indexability
        id: audit
        continue-on-error: true
        env:
          SITEMAP_STRICT: "1"
          SITEMAP_VALIDATION_BASE_URL: ${{ steps.preview.outputs.url }}
          SITEMAP_CANONICAL_ORIGIN: https://masseurmatch.com
          SITEMAP_VALIDATION_CONCURRENCY: "6"
          VERCEL_PROTECTION_BYPASS: ${{ secrets.VERCEL_PROTECTION_BYPASS }}
        run: |
          cat > /tmp/vercel-preview-fetch.mjs <<'EOF'
          const token = process.env.VERCEL_PROTECTION_BYPASS?.trim();
          const originalFetch = globalThis.fetch;

          globalThis.fetch = async (input, init = {}) => {
            const headers = new Headers(init.headers || {});
            if (token) headers.set("x-vercel-protection-bypass", token);

            const response = await originalFetch(input, { ...init, headers });
            const requestUrl = new URL(
              typeof input === "string" || input instanceof URL ? input : input.url,
            );

            // Vercel intentionally noindexes every preview deployment. Strip only
            // that platform header so the audit can still enforce page-level meta
            // robots, canonicals, redirects, HTTP status, and production robots.txt.
            if (
              requestUrl.hostname.endsWith(".vercel.app") &&
              response.headers.get("x-robots-tag")?.toLowerCase().includes("noindex")
            ) {
              const responseHeaders = new Headers(response.headers);
              responseHeaders.delete("x-robots-tag");
              return new Response(response.body, {
                status: response.status,
                statusText: response.statusText,
                headers: responseHeaders,
              });
            }

            return response;
          };
          EOF
          node --import /tmp/vercel-preview-fetch.mjs scripts/validate-sitemap.mjs > sitemap-preview-audit.log 2>&1

      - name: Upload sitemap audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sitemap-preview-audit
          path: sitemap-preview-audit.log
          retention-days: 7
          if-no-files-found: error

      - name: Publish successful audit summary
        if: steps.audit.outcome == 'success'
        run: cat sitemap-preview-audit.log

      - name: Enforce clean sitemap gate
        if: steps.audit.outcome == 'failure'
        run: |
          cat sitemap-preview-audit.log
          exit 1
