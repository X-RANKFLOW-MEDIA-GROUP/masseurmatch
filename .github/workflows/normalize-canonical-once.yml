name: Normalize Canonical URLs Once

on:
  push:
    branches:
      - fix/production-canonical-city-indexing-20260723
    paths:
      - .github/workflows/normalize-canonical-once.yml

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/production-canonical-city-indexing-20260723
          fetch-depth: 0

      - name: Normalize audited canonical URLs
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const files = [
            'src/app/blog/page.tsx',
            'src/app/blog/[slug]/page.tsx',
            'src/app/pricing/page.tsx',
            'src/app/for-therapists/page.tsx',
            'src/app/trust/page.tsx',
            'src/app/faq/page.tsx',
            'src/app/privacy/page.tsx',
            'src/app/terms/page.tsx',
            'src/app/cookie-policy/page.tsx',
            'src/app/verification/page.tsx',
          ];

          const from = 'https://masseurmatch.com';
          const to = 'https://www.masseurmatch.com';
          let replacements = 0;

          for (const file of files) {
            const source = fs.readFileSync(file, 'utf8');
            const count = source.split(from).length - 1;
            if (count === 0) {
              console.log(`${file}: no legacy origin found`);
              continue;
            }
            fs.writeFileSync(file, source.replaceAll(from, to));
            replacements += count;
            console.log(`${file}: ${count} replacement(s)`);
          }

          if (replacements === 0) {
            throw new Error('No canonical URLs were changed; refusing an empty automation commit.');
          }

          console.log(`Normalized ${replacements} absolute URL(s).`);
          NODE

      - name: Remove one-time workflow
        run: rm .github/workflows/normalize-canonical-once.yml

      - name: Commit normalized source
        run: |
          git config user.name "segattihall-ops"
          git config user.email "segatti.hall@gmail.com"
          git add src/app .github/workflows/normalize-canonical-once.yml
          git commit -m "fix(seo): normalize remaining canonical URLs [canonical-normalized]"
          git push origin HEAD:fix/production-canonical-city-indexing-20260723
