name: Go Live Release Checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-checks:
    name: Release checks
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_APP_URL: https://masseurmatch.com
      KNOTTY_LEARNING_ENABLED: "false"
      KNOTTY_DEBUG_RANKING: "false"
    steps:
      - name: Checkout exact event revision
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.32.1
      - name: Install Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies from lockfile
        run: pnpm install --frozen-lockfile
      - name: Verify dependency manifests are unchanged
        run: git diff --exit-code package.json pnpm-lock.yaml
      - name: Run complete release validation
        run: pnpm release:check
