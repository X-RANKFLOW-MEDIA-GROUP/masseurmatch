name: Go Live Release Checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-checks:
    name: Release checks
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_APP_URL: https://masseurmatch.com
      KNOTTY_LEARNING_ENABLED: "false"
      KNOTTY_DEBUG_RANKING: "false"
    steps:
      - name: Checkout repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags --prune --depth=1 origin "${GITHUB_SHA}"
          git checkout --force FETCH_HEAD
      - name: Install Node.js 24 and pnpm
        env:
          PNPM_VERSION: 10.32.1
        run: |
          set -euo pipefail
          NODE_BIN=""
          if [ -d /opt/hostedtoolcache/node ]; then
            NODE_BIN="$(find /opt/hostedtoolcache/node -path '*/24.*/x64/bin' -type d 2>/dev/null | sort -V | tail -n 1 || true)"
          fi
          if [ -z "$NODE_BIN" ]; then
            NODE_VERSION="$(curl -fsSL https://nodejs.org/dist/index.tab | awk 'NR > 1 && $1 ~ /^v24\./ { sub(/^v/, "", $1); print $1; exit }')"
            test -n "$NODE_VERSION"
            mkdir -p "$RUNNER_TEMP/node"
            curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.xz" | tar -xJ --strip-components=1 -C "$RUNNER_TEMP/node"
            NODE_BIN="$RUNNER_TEMP/node/bin"
          fi
          echo "$NODE_BIN" >> "$GITHUB_PATH"
          export PATH="$NODE_BIN:$PATH"
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate
          node --version
          pnpm --version
      - run: pnpm install --frozen-lockfile
      - run: git diff --exit-code package.json pnpm-lock.yaml
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm validate:sitemap
      - run: pnpm validate:db-contract
      - run: pnpm release:audit
      - run: pnpm release:check
      - run: pnpm build
