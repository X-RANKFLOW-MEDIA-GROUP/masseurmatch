name: Go Live Release Checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-checks:
    name: Release checks
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_APP_URL: https://masseurmatch.com
      KNOTTY_LEARNING_ENABLED: "false"
      KNOTTY_DEBUG_RANKING: "false"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 1
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - name: Install Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: git diff --exit-code package.json pnpm-lock.yaml
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm validate:sitemap
      - run: pnpm validate:db-contract
      - run: pnpm release:audit
      - run: pnpm release:check
