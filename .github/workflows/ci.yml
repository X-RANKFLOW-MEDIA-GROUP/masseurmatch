name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # ── Public (safe to hardcode or keep as defaults) ──
  NEXT_PUBLIC_APP_URL: https://masseurmatch.com

  # ── Public keys (from secrets) ──
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
  NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
  NEXT_PUBLIC_GOOGLE_MAPS_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_KEY }}

  # ── Server-side secrets ──
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
  STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
  STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
  REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
  TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
  TWILIO_VERIFY_SERVICE_SID: ${{ secrets.TWILIO_VERIFY_SERVICE_SID }}
  SIGHTENGINE_API_USER: ${{ secrets.SIGHTENGINE_API_USER }}
  SIGHTENGINE_API_SECRET: ${{ secrets.SIGHTENGINE_API_SECRET }}
  SITEMAP_SUPABASE_KEY: ${{ secrets.SITEMAP_SUPABASE_KEY }}

jobs:

  vercel-lockfile-guard:
    name: Vercel lockfile guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks (OSS)
        env:
          GITLEAKS_VERSION: 8.24.2
        run: |
          tmpdir="$(mktemp -d)"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz -C "$tmpdir" gitleaks
          install -m 0755 "$tmpdir/gitleaks" /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan for secrets (gitleaks)
        run: gitleaks detect --source . --redact --verbose --exit-code 1

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  db-contract:
    name: DB Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm validate:db-contract

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:unit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint, unit-tests, db-contract]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.css') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  # Resolve the Vercel preview URL for this PR's head commit so the E2E/a11y
  # suites test the code under review instead of production. Reads the GitHub
  # deployment statuses that the Vercel integration creates (no third-party
  # action). Outputs an empty string if none resolves in time — the test jobs
  # then fall back to the production base URL so they never regress.
  preview-url:
    name: Resolve preview URL
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    outputs:
      url: ${{ steps.resolve.outputs.url }}
    steps:
      - name: Wait for Vercel preview deployment
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.pull_request.head.sha;
            const deadlineMs = Date.now() + 10 * 60 * 1000; // 10 minutes
            const isPreview = (u) => !!u && /vercel\.app/.test(u);
            while (Date.now() < deadlineMs) {
              const deployments = await github.rest.repos.listDeployments({
                owner: context.repo.owner, repo: context.repo.repo, sha, per_page: 100,
              });
              for (const d of deployments.data) {
                const statuses = await github.rest.repos.listDeploymentStatuses({
                  owner: context.repo.owner, repo: context.repo.repo,
                  deployment_id: d.id, per_page: 100,
                });
                const ready = statuses.data.find(
                  (s) => s.state === 'success' && isPreview(s.target_url || s.environment_url),
                );
                if (ready) {
                  const url = ready.target_url || ready.environment_url;
                  core.info(`Resolved preview URL: ${url}`);
                  core.setOutput('url', url);
                  return;
                }
                if (statuses.data.some((s) => ['failure', 'error'].includes(s.state))) {
                  core.warning(`Deployment ${d.id} failed; will keep polling for another.`);
                }
              }
              await new Promise((r) => setTimeout(r, 15000));
            }
            core.warning('No Vercel preview URL resolved in time; tests will fall back to PLAYWRIGHT_BASE_URL.');
            core.setOutput('url', '');

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-jammy
      options: --ipc=host
    needs: [build, preview-url]
    env:
      # Prefer this PR's preview deployment; fall back to the configured base URL
      # (production) on pushes to main or if no preview resolved.
      PLAYWRIGHT_BASE_URL: ${{ needs.preview-url.outputs.url != '' && needs.preview-url.outputs.url || vars.PLAYWRIGHT_BASE_URL }}
      # Bypass Vercel Deployment Protection on preview URLs (no-op if unset or
      # if previews aren't protection-enabled). Set as a repo/Environment secret.
      VERCEL_PROTECTION_BYPASS: ${{ secrets.VERCEL_PROTECTION_BYPASS }}
    # Runs when a base URL is available: a resolved preview (PRs) or the
    # configured production var (pushes / preview fallback). preview-url is
    # skipped on push, so guard with always() + build success.
    if: ${{ always() && needs.build.result == 'success' && (needs.preview-url.outputs.url != '' || vars.PLAYWRIGHT_BASE_URL != '') }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run E2E tests
        run: pnpm exec playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

  a11y:
    name: Accessibility (WCAG 2.1 AA)
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-jammy
      options: --ipc=host
    needs: [build, preview-url]
    env:
      # Prefer this PR's preview deployment; fall back to the configured base URL.
      PLAYWRIGHT_BASE_URL: ${{ needs.preview-url.outputs.url != '' && needs.preview-url.outputs.url || vars.PLAYWRIGHT_BASE_URL }}
      VERCEL_PROTECTION_BYPASS: ${{ secrets.VERCEL_PROTECTION_BYPASS }}
    # Runs alongside the E2E suite whenever a deployed URL is available.
    if: ${{ always() && needs.build.result == 'success' && (needs.preview-url.outputs.url != '' || vars.PLAYWRIGHT_BASE_URL != '') }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run accessibility tests
        run: pnpm exec playwright test tests/a11y/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: a11y-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore
