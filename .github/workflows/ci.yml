name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # ── Public (safe to hardcode or keep as defaults) ──
  NEXT_PUBLIC_APP_URL: https://masseurmatch.com

  # ── Public keys (from secrets) ──
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
  NEXT_PUBLIC_GOOGLE_MAPS_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_KEY }}

  # ── Server-side secrets ──
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
  STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
  STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
  REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
  TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
  TWILIO_VERIFY_SERVICE_SID: ${{ secrets.TWILIO_VERIFY_SERVICE_SID }}
  SIGHTENGINE_API_USER: ${{ secrets.SIGHTENGINE_API_USER }}
  SIGHTENGINE_API_SECRET: ${{ secrets.SIGHTENGINE_API_SECRET }}
  SITEMAP_SUPABASE_KEY: ${{ secrets.SITEMAP_SUPABASE_KEY }}

jobs:

  vercel-lockfile-guard:
    name: Vercel lockfile guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags --prune --depth=1 origin "${{ github.sha }}"
          git checkout --force FETCH_HEAD
      - name: Install Node.js 24 and pnpm
        env:
          PNPM_VERSION: 10.32.1
        run: |
          set -euo pipefail
          NODE_BIN=""
          if [ -d /opt/hostedtoolcache/node ]; then
            NODE_BIN="$(find /opt/hostedtoolcache/node -path '*/24.*/x64/bin' -type d 2>/dev/null | sort -V | tail -n 1 || true)"
          fi
          if [ -z "$NODE_BIN" ]; then
            NODE_VERSION="$(curl -fsSL https://nodejs.org/dist/index.tab | awk 'NR > 1 && $1 ~ /^v24\./ { sub(/^v/, "", $1); print $1; exit }')"
            test -n "$NODE_VERSION"
            mkdir -p "$RUNNER_TEMP/node"
            curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.xz" | tar -xJ --strip-components=1 -C "$RUNNER_TEMP/node"
            NODE_BIN="$RUNNER_TEMP/node/bin"
          fi
          echo "$NODE_BIN" >> "$GITHUB_PATH"
          export PATH="$NODE_BIN:$PATH"
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate
          node --version
          pnpm --version
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --prune origin "${{ github.sha }}"
          git checkout --force FETCH_HEAD
      - name: Install gitleaks (OSS)
        env:
          GITLEAKS_VERSION: 8.24.2
        run: |
          tmpdir="$(mktemp -d)"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz -C "$tmpdir" gitleaks
          install -m 0755 "$tmpdir/gitleaks" /usr/local/bin/gitleaks
      - name: Scan for secrets (gitleaks)
        run: gitleaks detect --source . --redact --verbose --exit-code 1

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags --prune --depth=1 origin "${{ github.sha }}"
          git checkout --force FETCH_HEAD
      - name: Install Node.js 24 and pnpm
        env:
          PNPM_VERSION: 10.32.1
        run: |
          set -euo pipefail
          NODE_BIN=""
          if [ -d /opt/hostedtoolcache/node ]; then
            NODE_BIN="$(find /opt/hostedtoolcache/node -path '*/24.*/x64/bin' -type d 2>/dev/null | sort -V | tail -n 1 || true)"
          fi
          if [ -z "$NODE_BIN" ]; then
            NODE_VERSION="$(curl -fsSL https://nodejs.org/dist/index.tab | awk 'NR > 1 && $1 ~ /^v24\./ { sub(/^v/, "", $1); print $1; exit }')"
            test -n "$NODE_VERSION"
            mkdir -p "$RUNNER_TEMP/node"
            curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.xz" | tar -xJ --strip-components=1 -C "$RUNNER_TEMP/node"
            NODE_BIN="$RUNNER_TEMP/node/bin"
          fi
          echo "$NODE_BIN" >> "$GITHUB_PATH"
          export PATH="$NODE_BIN:$PATH"
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate
          node --version
          pnpm --version
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags --prune --depth=1 origin "${{ github.sha }}"
          git checkout --force FETCH_HEAD
      - name: Install Node.js 24 and pnpm
        env:
          PNPM_VERSION: 10.32.1
        run: |
          set -euo pipefail
          NODE_BIN=""
          if [ -d /opt/hostedtoolcache/node ]; then
            NODE_BIN="$(find /opt/hostedtoolcache/node -path '*/24.*/x64/bin' -type d 2>/dev/null | sort -V | tail -n 1 || true)"
          fi
          if [ -z "$NODE_BIN" ]; then
            NODE_VERSION="$(curl -fsSL https://nodejs.org/dist/index.tab | awk 'NR > 1 && $1 ~ /^v24\./ { sub(/^v/, "", $1); print $1; exit }')"
            test -n "$NODE_VERSION"
            mkdir -p "$RUNNER_TEMP/node"
            curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.xz" | tar -xJ --strip-components=1 -C "$RUNNER_TEMP/node"
            NODE_BIN="$RUNNER_TEMP/node/bin"
          fi
          echo "$NODE_BIN" >> "$GITHUB_PATH"
          export PATH="$NODE_BIN:$PATH"
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate
          node --version
          pnpm --version
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - name: Checkout repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags --prune --depth=1 origin "${{ github.sha }}"
          git checkout --force FETCH_HEAD
      - name: Install Node.js 24 and pnpm
        env:
          PNPM_VERSION: 10.32.1
        run: |
          set -euo pipefail
          NODE_BIN=""
          if [ -d /opt/hostedtoolcache/node ]; then
            NODE_BIN="$(find /opt/hostedtoolcache/node -path '*/24.*/x64/bin' -type d 2>/dev/null | sort -V | tail -n 1 || true)"
          fi
          if [ -z "$NODE_BIN" ]; then
            NODE_VERSION="$(curl -fsSL https://nodejs.org/dist/index.tab | awk 'NR > 1 && $1 ~ /^v24\./ { sub(/^v/, "", $1); print $1; exit }')"
            test -n "$NODE_VERSION"
            mkdir -p "$RUNNER_TEMP/node"
            curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.xz" | tar -xJ --strip-components=1 -C "$RUNNER_TEMP/node"
            NODE_BIN="$RUNNER_TEMP/node/bin"
          fi
          echo "$NODE_BIN" >> "$GITHUB_PATH"
          export PATH="$NODE_BIN:$PATH"
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate
          node --version
          pnpm --version
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 30
    concurrency:
      group: e2e-${{ github.ref }}
      cancel-in-progress: false
    env:
      PLAYWRIGHT_BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL }}
      VERCEL_PROTECTION_BYPASS: ${{ secrets.VERCEL_PROTECTION_BYPASS }}
    if: ${{ vars.PLAYWRIGHT_BASE_URL != '' }}
    steps:
      - name: Checkout repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags --prune --depth=1 origin "${{ github.sha }}"
          git checkout --force FETCH_HEAD
      - name: Install Node.js 24 and pnpm
        env:
          PNPM_VERSION: 10.32.1
        run: |
          set -euo pipefail
          NODE_BIN=""
          if [ -d /opt/hostedtoolcache/node ]; then
            NODE_BIN="$(find /opt/hostedtoolcache/node -path '*/24.*/x64/bin' -type d 2>/dev/null | sort -V | tail -n 1 || true)"
          fi
          if [ -z "$NODE_BIN" ]; then
            NODE_VERSION="$(curl -fsSL https://nodejs.org/dist/index.tab | awk 'NR > 1 && $1 ~ /^v24\./ { sub(/^v/, "", $1); print $1; exit }')"
            test -n "$NODE_VERSION"
            mkdir -p "$RUNNER_TEMP/node"
            curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.xz" | tar -xJ --strip-components=1 -C "$RUNNER_TEMP/node"
            NODE_BIN="$RUNNER_TEMP/node/bin"
          fi
          echo "$NODE_BIN" >> "$GITHUB_PATH"
          export PATH="$NODE_BIN:$PATH"
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate
          node --version
          pnpm --version
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright system dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: npx playwright install-deps chromium
      - name: Install Playwright browsers
        timeout-minutes: 15
        run: npx playwright install chromium
      - name: Run E2E tests
        run: npx playwright test --timeout=30000 --retries=1
      - name: Summarize Playwright report
        if: failure()
        run: |
          if [ -d playwright-report ]; then
            tar -czf playwright-report.tgz playwright-report
            echo "### Playwright report" >> "$GITHUB_STEP_SUMMARY"
            echo "The Playwright HTML report was compressed as playwright-report.tgz on the runner." >> "$GITHUB_STEP_SUMMARY"
            ls -lh playwright-report.tgz
          fi
