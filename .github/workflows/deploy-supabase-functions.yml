name: Deploy Supabase Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/auth-email-hook/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-supabase-functions.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-supabase-functions
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy auth-email-hook
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify required config is present
        run: |
          missing=0
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Secret SUPABASE_ACCESS_TOKEN is not set."
            missing=1
          fi
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::Variable SUPABASE_PROJECT_REF is not set."
            missing=1
          fi
          [ "$missing" -eq 0 ]

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy auth-email-hook
        run: supabase functions deploy auth-email-hook --project-ref "$SUPABASE_PROJECT_REF"
