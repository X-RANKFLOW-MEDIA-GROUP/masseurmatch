name: Temporary Sitemap Service Gate

on:
  push:
    branches:
      - fix/prelaunch-blockers-20260722
    paths:
      - ".github/workflows/temporary-sitemap-service-gate.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/prelaunch-blockers-20260722
      - name: Gate long-tail service paths
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("src/app/_lib/sitemap-release.ts")
          text = path.read_text(encoding="utf-8")
          old = """    return Boolean(
      citySlug &&
        eligibleCitySlugs.has(citySlug) &&
        isLaunchUrl(path) &&
        (launchSegmentPaths.has(path) || launchKeywordPaths.has(path)),
    );"""
          new = """    return Boolean(
      INCLUDE_LOCAL_LONG_TAIL_PATHS &&
        citySlug &&
        eligibleCitySlugs.has(citySlug) &&
        isLaunchUrl(path) &&
        (launchSegmentPaths.has(path) || launchKeywordPaths.has(path)),
    );"""
          if old not in text:
              raise SystemExit("service sitemap filter block not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
          rm .github/workflows/temporary-sitemap-service-gate.yml
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/_lib/sitemap-release.ts .github/workflows/temporary-sitemap-service-gate.yml
          git commit -m "fix(seo): exclude noindex service routes from sitemap"
          git push origin HEAD:fix/prelaunch-blockers-20260722
